<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نماذج وثائق الزواج</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body{
            font-family:'Cairo',sans-serif;
            background:linear-gradient(135deg,#f4f7fb,#dce9f8);
            min-height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding: 20px 12px;
        }

        .container {
            background:#fff;
            padding: 40px 30px;
            border-radius:18px;
            box-shadow:0 12px 30px rgba(0,0,0,.12);
            text-align:center;
            width:100%;
            max-width:540px;
            margin: auto;
        }

        h1{
            color:#0b4f8a;
            margin-bottom:30px;
            font-size:26px;
            font-weight: 700;
            line-height: 1.4;
        }

        .buttons{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .btn{
            display:block;
            text-decoration:none;
            background:#0b6db7;
            color:#fff;
            padding:15px 12px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            transition: all 0.2s ease-in-out;
            box-shadow:0 4px 12px rgba(11, 109, 183, 0.2);
        }

        /* تأثيرات اللمس لسطح المكتب والأجهزة الذكية */
        @media (hover: hover) {
            .btn:hover{
                background:#084d81;
                transform:translateY(-2px);
                box-shadow:0 6px 15px rgba(8, 77, 129, 0.3);
            }
        }

        .btn:active{
            transform:scale(.97);
            opacity: 0.95;
        }

        /* تحسينات متناهية الصغر لشاشات الهواتف الضيقة جداً القديمة */
        @media (max-width:375px){
            .container {
                padding: 30px 16px;
            }
            h1 {
                font-size: 22px;
                margin-bottom: 24px;
            }
            .btn {
                font-size: 16px;
                padding: 13px 10px;
            }
            .buttons {
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>اختر نموذج وثيقة الزواج</h1>

    <div class="buttons">

        <a href="page1.html" class="btn">
            نموذج رقم 1 لوثيقة الزواج
        </a>

        <a href="page2.html" class="btn">
            نموذج لوثيقة الزواج رقم 2
        </a>

        <a href="page3.html" class="btn">
            نموذج لوثيقة الزواج رقم 3
        </a>

        <a href="page4.html" class="btn">
            نموذج لوثيقة الزواج رقم 4
        </a>

        <a href="page5.html" class="btn">
            نموذج لوثيقة الزواج رقم 5
        </a>

    </div>

</div>

</body>
</html>
